<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout & Typography Demo</title>
    <!-- Links to your external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="para1">
            <p class="bold-text">Box1 (Header)</p>
        </div>
        <div class="para2">
            <p>Box2 (Sidebar)</p>
        </div>
        <div class="para3">
            <p>Box3 (Main)</p>
        </div>
        <div class="para4">
            <p>Box4 (Right)</p>
        </div>
        <div class="para5">
            <p>Box5 (Footer)</p>
        </div>
    </div>
</body>
</html>
